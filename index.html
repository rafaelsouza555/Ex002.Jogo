<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> O Dispertar da Aura-7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="passo ativo" id="passo-0">
            <p>O Terminal ao seu lado brilha em vermelho. Você pode tentar hackear o sistema para obter informações ou correr direto para a eclusa de ar.</p>
            <button class="btnproximo" data-proximo="1">HACKEAR:Você descobre o que houve um vazamento biologico, mas perde tempo precioso.</button>
            <button class="btnproximo" data-proximo="2">Correr:Você  ganha tempo, mas entra no corredor sem saber o que espera</button>
        </div>
        <div class="passo" id="passo-1">
            <p>`À esquerda, as luzes piscam (setor residencial). À direita, está tudo escuro (setor de carga)</p>
            <button class="btnproximo" data-proximo="3">Residencial: Você encontra um kit médico, mas o caminho é obstruido por escombros.</button>
            <button class="btnproximo" data-proximo="4">Carga: Você encontra uma lanterna, mas ouve algo se movendo nas sombras</button>
        </div>
    </main>
</body>
</html>
